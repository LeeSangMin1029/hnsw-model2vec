[package]
name = "v-hnsw-cli"
description = "CLI tool for v-hnsw vector database"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[[bin]]
name = "v-hnsw"
path = "src/main.rs"

[dependencies]
# Internal crates
v-hnsw-core.workspace = true
v-hnsw-graph.workspace = true
v-hnsw-distance.workspace = true
v-hnsw-storage.workspace = true
v-hnsw-search = { workspace = true, features = ["korean"] }
v-hnsw-embed.workspace = true
v-hnsw-tokenizer = { path = "../v-hnsw-tokenizer" }
v-hnsw-chunk = { path = "../v-hnsw-chunk" }

# CLI
clap = { workspace = true, features = ["derive"] }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"

# Progress bars
indicatif = "0.17"

# Pipeline parallelism
crossbeam.workspace = true

# Ctrl+C handling
ctrlc = "3.4"

# Arrow / Parquet
arrow.workspace = true
parquet.workspace = true

# Directory walking
walkdir = "2"

# Cache directory
directories = "5"

# Logging
tracing.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[features]
default = []

[lints]
workspace = true
