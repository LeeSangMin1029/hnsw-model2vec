[build]
# Limit parallel jobs to half cores — prevents CPU starvation during compilation
jobs = 8
# Deploy builds: RUSTC_WRAPPER=sccache cargo build --release
# sccache disabled by default — conflicts with incremental compilation

[target.x86_64-pc-windows-msvc]
linker = "rust-lld"
rustflags = ["-C", "target-feature=+avx2", "-C", "target-feature=+crt-static"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-feature=+avx2"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-feature=+neon"]

[alias]
nt = "nextest run"
