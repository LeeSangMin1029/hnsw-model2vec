name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
            features: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
            features: "cuda"
            suffix: "-cuda"

          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            features: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            features: "cuda"
            suffix: "-cuda"

          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
            features: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
            features: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install CUDA toolkit (Linux)
        if: matrix.features == 'cuda' && runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.11
        with:
          cuda: '12.2.0'

      - name: Install CUDA toolkit (Windows)
        if: matrix.features == 'cuda' && runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.11
        with:
          cuda: '12.2.0'

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} -p v-hnsw-cli ${{ matrix.features && format('--features {0}', matrix.features) || '' }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/v-hnsw${{ matrix.ext }} dist/v-hnsw${{ matrix.suffix || '' }}${{ matrix.ext }}
          Compress-Archive -Path dist/* -DestinationPath v-hnsw-${{ matrix.target }}${{ matrix.suffix || '' }}.zip

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/v-hnsw${{ matrix.ext }} dist/v-hnsw${{ matrix.suffix || '' }}${{ matrix.ext }}
          tar -czvf v-hnsw-${{ matrix.target }}${{ matrix.suffix || '' }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v-hnsw-${{ matrix.target }}${{ matrix.suffix || '' }}
          path: v-hnsw-*.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
